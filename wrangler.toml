# nfluencer-admin — Hono Cloudflare Worker
#
# Admin API microservice for nfluencer.co
#
# Dev:        npm run dev               → http://localhost:8788 
# Deploy:     npm run deploy
# 
# Note: Bindings (D1, R2, KV, Queue) are configured via Cloudflare Dashboard
# rather than hardcoded in wrangler.toml to support both dev and production.

name = "nfluencer-admin"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
DOMAIN = "nfluencer.co"
DASHBOARD_ORIGIN = "https://dashboard.nfluencer.co"
MAIN_APP_ORIGIN = "https://www.nfluencer.co"
