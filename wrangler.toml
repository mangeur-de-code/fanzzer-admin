# nfluencer-admin — Hono Cloudflare Worker
#
# Standalone admin API microservice. All 29 admin endpoints extracted from the
# main app and served through a Hono router at api-admin.<DOMAIN>/api/v1/admin/*.
#
# Dev:        npm run dev               → http://localhost:8788
# Deploy:     npm run deploy            → staging
# Production: npm run deploy:production → production

name = "nfluencer-admin"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "creator-platform-dev-database"
database_id = "17596f40-214e-4159-aef9-d3c39a6a0731"
preview_database_id = "17596f40-214e-4159-aef9-d3c39a6a0731"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "creator-platform-dev-bucket"
preview_bucket_name = "creator-platform-dev-bucket"

[[kv_namespaces]]
binding = "KV"
id = "c312213fa3fb42f7b7f05d084683e69e"
preview_id = "c312213fa3fb42f7b7f05d084683e69e"

[[queues.producers]]
binding = "NOTIFY_QUEUE"
queue = "creator-platform-notifications"

[vars]
DOMAIN = "nfluencer.co"
DASHBOARD_ORIGIN = "https://dashboard.nfluencer.co"
MAIN_APP_ORIGIN = "https://www.nfluencer.co"

[env.production]
name = "nfluencer-admin-production"
# Custom domain configured manually in Cloudflare dashboard after first deploy:
# api-admin.nfluencer.co → Workers & Pages → Custom Domains

[[env.production.d1_databases]]
binding = "DB"
database_name = "creator-platform-production-database"
database_id = "9ae01b02-4f29-48f3-bcbb-6d278294c460"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "creator-platform-production-bucket"

[[env.production.kv_namespaces]]
binding = "KV"
id = "8064dd40692840cf896c27c60c87ea20"

[[env.production.queues.producers]]
binding = "NOTIFY_QUEUE"
queue = "creator-platform-notifications-production"

[env.production.vars]
DOMAIN = "nfluencer.co"
DASHBOARD_ORIGIN = "https://dashboard.nfluencer.co"
MAIN_APP_ORIGIN = "https://www.nfluencer.co"
