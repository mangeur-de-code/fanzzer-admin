# Deploy Admin Service  
name: Deploy Admin Service

on:
  push:
    branches: [main]
    paths: ['src/**', 'wrangler.toml', 'package.json', 'package-lock.json']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Admin Service to Cloudflare Workers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript build check
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Test deployment health
        run: |
          sleep 10
          curl -f "https://fanzzer-admin.dlouis20.workers.dev/health" || exit 1